<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Invoice - Sikat Araw Trading Corp.</title>
  <link rel="icon" type="image/png" href="assets/wholesale-sales-management-favicon.png">
  <style>
    @page { size: A4; margin: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Arial', sans-serif; background: #e0e0e0; padding: 10px; }
    .print-bar { position: fixed; top: 0; left: 0; right: 0; background: #1d6fd6; color: #fff; padding: 10px 20px; display: flex; justify-content: center; gap: 12px; z-index: 100; }
    .print-bar button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .print-bar .btn-print { background: #fff; color: #1d6fd6; }
    .print-bar .btn-back { background: rgba(255,255,255,.2); color: #fff; }
    body { padding-top: 55px; }
    .si-sheet {
      width: 210mm; height: 297mm; margin: 0 auto; padding: 0;
      background: #fff; border: 1px solid #999; position: relative; overflow: hidden;
    }
    .si-cell { position: absolute; font-size: 9px; line-height: 1.2; }
    .si-mark { top: 5mm; left: 40mm; font-size: 10px; }
    .si-date { top: 5mm; right: 18mm; font-size: 9px; }
    .si-customer { top: 22mm; left: 48mm; font-size: 11px; font-weight: bold; }
    .si-tin { top: 28mm; left: 48mm; font-size: 9px; }
    .si-address { top: 34mm; left: 48mm; right: 15mm; font-size: 9px; }
    .si-period-label { top: 48mm; left: 36mm; font-size: 9px; font-weight: bold; }
    .si-period-value { top: 48mm; left: 80mm; font-size: 9px; }
    .si-product { top: 58mm; left: 48mm; font-size: 9px; }
    .si-amount { top: 58mm; right: 30mm; font-size: 9px; text-align: right; }
    .si-totals { position: absolute; bottom: 55mm; left: 20mm; right: 15mm; }
    .si-totals table { width: 100%; border-collapse: collapse; font-size: 9px; }
    .si-totals td { padding: 2px 4px; }
    .si-totals .label { text-align: left; width: 110px; }
    .si-totals .value { text-align: right; width: 70px; }
    .si-totals .cat { text-align: left; width: 120px; font-size: 8px; }
    .si-totals .total-row { border-top: 1px solid #000; font-weight: bold; }
    .si-prepared { position: absolute; bottom: 22mm; left: 36mm; font-size: 9px; }
    .si-signature { position: absolute; bottom: 22mm; right: 15mm; text-align: center; }
    .si-signature .sig-line { border-top: 1px solid #000; width: 100px; margin-top: 25px; padding-top: 3px; font-size: 8px; }
    @media print {
      body { background: #fff; padding: 0; }
      .print-bar { display: none !important; }
      .si-sheet { border: none; box-shadow: none; width: 100%; height: auto; }
    }
  </style>
</head>
<body>
  <div class="print-bar">
    <button class="btn-print" onclick="window.print()">Print Invoice</button>
    <button class="btn-back" onclick="history.back()">Back</button>
  </div>
  <div class="si-sheet">
    <div class="si-cell si-mark" id="siMark">x</div>
    <div class="si-cell si-date" id="siDate">-</div>
    <div class="si-cell si-customer" id="siCustomer">-</div>
    <div class="si-cell si-tin" id="siTin">-</div>
    <div class="si-cell si-address" id="siAddress">-</div>
    <div class="si-cell si-period-label">SALES PERIOD:</div>
    <div class="si-cell si-period-value" id="siPeriod">-</div>
    <div class="si-cell si-product" id="siProduct">ASSORTED FRESH AND FROZEN SEAFOOD</div>
    <div class="si-cell si-amount" id="siAmount">-</div>
    <div class="si-totals">
      <table>
        <tr>
          <td class="label" id="siTotalVatIncLabel">TOTAL SALES VAT INC</td>
          <td class="value" id="siTotalVatInc">-</td>
          <td></td>
          <td class="cat">VATABLE SALE</td>
        </tr>
        <tr>
          <td class="label">LESS VAT</td>
          <td class="value" id="siLessVat">-</td>
          <td></td>
          <td class="cat">VAT</td>
        </tr>
        <tr>
          <td class="label">NET OF VAT</td>
          <td class="value" id="siNetVat">-</td>
          <td></td>
          <td class="cat">ZERO RATED SALES</td>
        </tr>
        <tr>
          <td class="label">LESS DISCOUNT</td>
          <td class="value" id="siDiscount">-</td>
          <td></td>
          <td class="cat">VAT EXEMPT SALES</td>
        </tr>
        <tr>
          <td class="label">LESS EWT</td>
          <td class="value" id="siEwt">-</td>
          <td></td>
          <td class="cat">LESS EWT</td>
        </tr>
        <tr>
          <td class="label">ADD: VAT</td>
          <td class="value" id="siAddVat">-</td>
          <td></td>
          <td class="cat">ADD: VAT</td>
        </tr>
        <tr class="total-row">
          <td class="label">TOTAL AMOUNT DUE</td>
          <td class="value" id="siTotalDue">-</td>
          <td></td>
          <td class="cat">TOTAL AMOUNT DUE</td>
        </tr>
      </table>
    </div>
    <div class="si-cell si-prepared">Prepared by: <span id="siPreparedBy">-</span></div>
    <div class="si-cell si-signature">
      <div class="sig-line"></div>
      <small>Authorized Signature</small>
    </div>
  </div>
  <script>
    const p = new URLSearchParams(window.location.search);
    const fmt = (v) => '₱' + Number(v || 0).toLocaleString('en-PH', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    const dateVal = p.get('date');
    let dateStr = '-';
    if (dateVal) { const d = new Date(dateVal); dateStr = d.toLocaleDateString('en-PH', {year:'numeric',month:'long',day:'2-digit'}); }
    document.getElementById('siDate').textContent = dateStr;
    document.getElementById('siCustomer').textContent = ' ' + (p.get('customer') || '-');
    document.getElementById('siTin').textContent = ' ' + (p.get('tin') || '-');
    document.getElementById('siAddress').textContent = ' ' + (p.get('address') || '-');
    document.getElementById('siPeriod').textContent = p.get('period') || '-';
    document.getElementById('siProduct').textContent = p.get('description') || 'ASSORTED FRESH AND FROZEN SEAFOOD';
    const gross = parseFloat(p.get('gross') || 0);
    const freight = parseFloat(p.get('freight') || 0);
    const returns = parseFloat(p.get('returns') || 0);
    const ewt = parseFloat(p.get('ewt') || 0);
    const discount = parseFloat(p.get('discount') || 0);
    const totalVatInc = gross + freight;
    const lessVat = totalVatInc / 1.12 * 0.12;
    const netVat = totalVatInc - lessVat;
    const lessEwt = ewt;
    const addVat = lessVat;
    const totalDue = netVat - discount - lessEwt + addVat;
    document.getElementById('siAmount').textContent = fmt(gross);
    document.getElementById('siTotalVatInc').textContent = fmt(totalVatInc);
    document.getElementById('siLessVat').textContent = fmt(lessVat);
    document.getElementById('siNetVat').textContent = fmt(netVat);
    document.getElementById('siDiscount').textContent = fmt(discount);
    document.getElementById('siEwt').textContent = fmt(lessEwt);
    document.getElementById('siAddVat').textContent = fmt(addVat);
    document.getElementById('siTotalDue').textContent = fmt(totalDue);
    document.getElementById('siPreparedBy').textContent = p.get('preparedBy') || 'M. Molo';
  </script>
</body>
</html>
